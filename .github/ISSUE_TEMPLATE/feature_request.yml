name: 💡 Feature request
description: Suggest an improvement or new capability.
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to propose an improvement. We review
        every request as part of roadmap planning.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user need or gap. Focus on the "why" before the "what".
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? If you have a specific design in mind, share it; if not, describing the desired outcome is enough.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or prior art you've seen.
    validations:
      required: false

  - type: dropdown
    id: surface
    attributes:
      label: Which Lace surface?
      options:
        - Browser extension
        - Mobile
        - Both
        - Source / build / verification process
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links to related issues, or anything else that helps us understand.
    validations:
      required: false
