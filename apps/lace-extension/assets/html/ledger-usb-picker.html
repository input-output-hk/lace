<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Lace — USB Device</title>
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 16px;
        background: #1a1a2e;
        color: #c0c0c0;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }
      button {
        padding: 10px 24px;
        border: none;
        border-radius: 8px;
        background: #7f5af0;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover {
        background: #6b46e0;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <p id="message"></p>
    <button id="connect"></button>
    <script type="text/javascript" src="./js/ledger-usb-picker.js"></script>
  </body>
</html>
